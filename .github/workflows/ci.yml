name: ci

on: [push, pull_request, workflow_dispatch]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: npx eslint ./src/

      - name: Tests unitaires
        run: |
          yarn test --reporter=default | tee test-output.txt
          echo "## 🧪 Résultats tests unitaires" >> $GITHUB_STEP_SUMMARY
          cat test-output.txt >> $GITHUB_STEP_SUMMARY

      - name: Audit dépendances
        run: |
          yarn audit --level moderate || true

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Build projet
        run: yarn build

      - name: Tests fonctionnels Cypress
        uses: cypress-io/github-action@v6
        with:
          start: yarn start
          wait-on: 'http://localhost:1234'
          wait-on-timeout: 60
