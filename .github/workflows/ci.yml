on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: JavaScript linting
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install dependencies
        run: |
      - run: npm install
      - run: npm run lint
         
          npm install -r requirements.txt
      - name: Run tests
        run: |
          npm test tests/