name: ci

on: [push, pull_request, workflow_dispatch]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: npx eslint ./src/

      - name: Tests unitaires
        run: |
          yarn test --reporter=default | tee test-output.txt
          echo "## 🧪 Résultats tests unitaires" >> $GITHUB_STEP_SUMMARY
          cat test-output.txt >> $GITHUB_STEP_SUMMARY

      - name: Audit dépendances
        run: |
          yarn audit --level moderate || true

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Build projet
        run: yarn build

      - name: Start Parcel server
        run: yarn start &

      - name: Wait for server
        run: npx wait-on http://localhost:1234 --timeout 30000

      - name: Tests fonctionnels Cypress
        run: |
          yarn test:e2e | tee cypress-output.txt
          echo "## 🌐 Résultats tests fonctionnels" >> $GITHUB_STEP_SUMMARY
          cat cypress-output.txt >> $GITHUB_STEP_SUMMARY